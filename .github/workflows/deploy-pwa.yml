# Deploy PEERPoint PWA to Azure Static Web Apps.
#
# One-time setup:
# 1. Azure Portal → Create "Static Web App" (SKU Free is fine for pilots).
# 2. Open the resource → Manage deployment token → copy the token.
# 3. GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#    Name:  AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN
#    Value: (paste token)
# 4. Push to `main` (or run this workflow manually from the Actions tab).

name: Deploy PEERPoint PWA

on:
  push:
    branches: [main]
    paths:
      - 'apps/pwa/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-pwa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/pwa/package-lock.json

      - name: Install and build PWA
        working-directory: apps/pwa
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/pwa
          api_location: ''
          output_location: dist
          skip_app_build: true
