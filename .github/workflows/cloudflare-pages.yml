# Primary PWA pipeline: build on GitHub Actions, deploy static dist to Cloudflare Pages.
#
# Secrets (repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — API token with "Cloudflare Pages — Edit"
#   CLOUDFLARE_ACCOUNT_ID  — from Cloudflare Workers & Pages overview
#
# Pages project name defaults to peer-support-pwa; change --project-name below and wrangler.toml / package.json deploy:pages if needed.

name: Deploy PWA to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/pwa/**'
      - 'packages/shared/**'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/pwa/package-lock.json

      - name: Build PWA
        working-directory: apps/pwa
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/pwa/dist --project-name=peer-support-pwa
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
