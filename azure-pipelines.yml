# Deploy PEERPoint PWA to Azure Static Web Apps from Azure Repos.
#
# One-time setup:
# 1. Azure Portal → Static Web App → Manage deployment token → copy token.
# 2. Azure DevOps → Pipelines → Library → Variable group (or pipeline variables):
#    Add variable AZURE_STATIC_WEB_APPS_API_TOKEN = (paste), mark Secret.
#    If using variable group, link it in the pipeline editor or reference below.
# 3. Create pipeline from this file (azure-pipelines.yml).
#
# Repo: https://dev.azure.com/sheriffs-office/SPFx%20Repos/_git/Peer%20Support
#
# Note: With skip_app_build: true, AzureStaticWebApp@0 expects app_location to be
# the prebuilt output folder (see Microsoft Learn: AzureStaticWebApp@0).

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '22.x'

steps:
  - checkout: self
    fetchDepth: 0

  - task: NodeTool@0
    inputs:
      versionSpec: $(NODE_VERSION)
    displayName: Use Node.js $(NODE_VERSION)

  - script: |
      set -e
      cd apps/pwa
      npm ci
      npm run build
    displayName: Install and build PWA

  - task: AzureStaticWebApp@0
    inputs:
      app_location: 'apps/pwa/dist'
      api_location: ''
      output_location: ''
      skip_app_build: true
      skip_api_build: true
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
    displayName: Deploy to Azure Static Web Apps
